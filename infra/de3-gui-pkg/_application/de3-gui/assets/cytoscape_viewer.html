<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Infra Graph — Cytoscape.js</title>
  <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; height: 100vh; overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
    }

    /* ── Graph canvas ──────────────────────────────────────────── */
    #cy { flex: 1; min-width: 0; }

    /* ── Sidebar ───────────────────────────────────────────────── */
    #sidebar {
      width: 280px; flex-shrink: 0;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #334155;
      font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    #search-wrap { padding: 10px 12px; border-bottom: 1px solid #334155; }
    #search {
      width: 100%; padding: 6px 10px;
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 12px; outline: none;
    }
    #search::placeholder { color: #475569; }
    #search:focus { border-color: #3b82f6; }
    #detail { flex: 1; overflow-y: auto; padding: 14px 16px; }

    /* ── Node detail card ──────────────────────────────────────── */
    #empty-msg { color: #475569; font-size: 13px; }
    #node-card { display: none; }
    #node-card.visible { display: block; }
    .nc-name {
      font-size: 15px; font-weight: 600; color: #f1f5f9;
      word-break: break-all; margin-bottom: 4px;
    }
    .nc-path {
      font-size: 10px; color: #475569; font-family: monospace;
      word-break: break-all; margin-bottom: 10px; line-height: 1.5;
    }
    .nc-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 9px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px;
    }
    .nc-props { border-top: 1px solid #334155; }
    .nc-prop {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #1e293b;
    }
    .nc-key { font-size: 11px; color: #64748b; }
    .nc-val { font-size: 11px; color: #cbd5e1; font-family: monospace; }
    .nc-hcl { color: #4ade80; }

    /* ── Legend ────────────────────────────────────────────────── */
    #legend {
      padding: 10px 14px; border-top: 1px solid #334155;
      font-size: 10px; color: #64748b;
    }
    .leg-title { font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Floating controls ─────────────────────────────────────── */
    #controls {
      position: absolute; top: 12px; left: 12px;
      display: flex; flex-direction: column; gap: 4px; z-index: 10;
    }
    .ctl {
      width: 32px; height: 32px;
      background: rgba(30,41,59,0.9); border: 1px solid #334155;
      border-radius: 6px; color: #94a3b8; cursor: pointer;
      font-size: 17px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .ctl:hover { background: #1e293b; color: #f1f5f9; }

    /* ── Layout switcher ───────────────────────────────────────── */
    #layouts {
      position: absolute; bottom: 12px; left: 12px;
      display: flex; gap: 4px; z-index: 10;
    }
    .lay-btn {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      background: rgba(30,41,59,0.9); border: 1px solid #334155;
      border-radius: 5px; color: #94a3b8; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .lay-btn:hover, .lay-btn.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }

    /* ── Loading overlay ───────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: #0f172a; color: #94a3b8; font-size: 14px; gap: 12px;
      z-index: 999;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #334155; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div>Loading infra graph…</div>

  <div id="controls">
    <button class="ctl" title="Zoom in"  id="btn-zoomin">+</button>
    <button class="ctl" title="Zoom out" id="btn-zoomout">−</button>
    <button class="ctl" title="Fit all"  id="btn-fit">⊡</button>
  </div>

  <div id="layouts">
    <button class="lay-btn active" data-layout="dagre">Hierarchy</button>
    <button class="lay-btn" data-layout="cose">Force</button>
    <button class="lay-btn" data-layout="breadthfirst">Breadth-first</button>
    <button class="lay-btn" data-layout="concentric">Concentric</button>
  </div>

  <div id="cy"></div>

  <div id="sidebar">
    <div id="sidebar-header">Infra Graph</div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Filter nodes…">
    </div>
    <div id="detail">
      <div id="empty-msg">Click a node to inspect it</div>
      <div id="node-card">
        <div class="nc-name" id="nc-name"></div>
        <div class="nc-path" id="nc-path"></div>
        <span class="nc-badge" id="nc-badge"></span>
        <div class="nc-props">
          <div class="nc-prop"><span class="nc-key">Type</span>    <span class="nc-val" id="nc-type"></span></div>
          <div class="nc-prop"><span class="nc-key">Provider</span><span class="nc-val" id="nc-provider"></span></div>
          <div class="nc-prop"><span class="nc-key">Depth</span>   <span class="nc-val" id="nc-depth"></span></div>
          <div class="nc-prop"><span class="nc-key">Resource</span><span class="nc-val nc-hcl" id="nc-hcl"></span></div>
        </div>
      </div>
    </div>
    <div id="legend">
      <div class="leg-title">Providers</div>
      <div id="leg-items"></div>
    </div>
  </div>

  <script>
    var cy;
    var ACCENT = {};

    var LAYOUT_OPTS = {
      dagre: {
        name: 'dagre', rankDir: 'TB', ranker: 'tight-tree',
        nodeSep: 35, rankSep: 55, edgeSep: 10,
        animate: true, animationDuration: 350,
      },
      cose: {
        name: 'cose', animate: true, animationDuration: 600,
        nodeRepulsion: 8000, gravity: 0.25,
      },
      breadthfirst: {
        name: 'breadthfirst', directed: true, spacingFactor: 1.3,
        animate: true, animationDuration: 350,
      },
      concentric: {
        name: 'concentric', animate: true, animationDuration: 350,
        concentric: function(n) { return 10 - n.data('depth'); },
        levelWidth: function() { return 1; },
      },
    };

    var activeLayout = 'dagre';

    function runLayout(name) {
      activeLayout = name;
      document.querySelectorAll('.lay-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.layout === name);
      });
      cy.layout(LAYOUT_OPTS[name] || LAYOUT_OPTS.dagre).run();
    }

    function showNode(node) {
      var d = node.data();
      var color = ACCENT[d.provider] || '#6B7280';
      document.getElementById('nc-name').textContent = d.label;
      document.getElementById('nc-path').textContent = d.id;
      document.getElementById('nc-type').textContent = d.type || '—';
      document.getElementById('nc-provider').textContent = d.provider || '(root)';
      document.getElementById('nc-depth').textContent = d.depth;
      document.getElementById('nc-hcl').textContent = d.has_terragrunt ? '✓  has terragrunt.hcl' : '—';
      var badge = document.getElementById('nc-badge');
      badge.textContent = d.provider || 'root';
      badge.style.background = color + '22';
      badge.style.color = color;
      badge.style.border = '1px solid ' + color + '44';
      document.getElementById('empty-msg').style.display = 'none';
      document.getElementById('node-card').classList.add('visible');
      // Notify parent Reflex app so right panel updates
      window.parent.postMessage({ type: 'nodeSelected', path: d.id }, '*');
    }

    function buildLegend(providers) {
      var html = '';
      providers.forEach(function(p) {
        var c = ACCENT[p] || '#6B7280';
        html += '<div class="leg-row">'
              + '<div class="leg-dot" style="background:' + c + '"></div>'
              + '<span>' + p + '</span></div>';
      });
      document.getElementById('leg-items').innerHTML = html;
    }

    function filterNodes(q) {
      q = q.trim().toLowerCase();
      if (!q) { cy.elements().removeClass('faded'); return; }
      cy.batch(function() {
        cy.nodes().forEach(function(n) {
          var hit = n.data('label').toLowerCase().includes(q)
                 || n.data('id').toLowerCase().includes(q);
          if (hit) n.removeClass('faded'); else n.addClass('faded');
        });
        cy.edges().addClass('faded');
      });
    }

    document.getElementById('btn-zoomin').onclick  = function() { cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } }); };
    document.getElementById('btn-zoomout').onclick = function() { cy.zoom({ level: cy.zoom() * 0.77, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } }); };
    document.getElementById('btn-fit').onclick     = function() { cy.fit(undefined, 40); };
    document.getElementById('search').oninput      = function() { filterNodes(this.value); };
    document.querySelectorAll('.lay-btn').forEach(function(b) {
      b.onclick = function() { runLayout(b.dataset.layout); };
    });

    fetch('/api/infra-graph')
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        ACCENT = resp.accent || {};
        var elements = resp.elements || [];
        var providers = resp.providers || [];

        cy = cytoscape({
          container: document.getElementById('cy'),
          elements: elements,
          minZoom: 0.05,
          maxZoom: 5,
          style: [
            {
              selector: 'node',
              style: {
                'label': 'data(label)',
                'font-size': '9px',
                'color': '#cbd5e1',
                'text-valign': 'bottom',
                'text-halign': 'center',
                'text-margin-y': '4px',
                'text-max-width': '90px',
                'text-wrap': 'ellipsis',
                'background-color': function(ele) {
                  return ACCENT[ele.data('provider')] || '#334155';
                },
                'border-width': function(ele) { return ele.data('has_terragrunt') ? 2 : 0; },
                'border-color': '#f1f5f9',
                'width':  function(ele) { return Math.max(14, 24 - ele.data('depth') * 2) + 'px'; },
                'height': function(ele) { return Math.max(14, 24 - ele.data('depth') * 2) + 'px'; },
                'shape':  function(ele) { return ele.data('has_terragrunt') ? 'round-rectangle' : 'ellipse'; },
                'opacity': 1,
              }
            },
            {
              selector: 'node[depth = 0]',
              style: {
                'font-size': '11px',
                'font-weight': '700',
                'color': '#f1f5f9',
                'background-color': '#1e3a5f',
                'border-width': 2,
                'border-color': '#3b82f6',
                'width': '34px',
                'height': '34px',
                'shape': 'round-rectangle',
              }
            },
            {
              selector: 'node[depth = 1]',
              style: {
                'font-size': '10px',
                'font-weight': '600',
                'width': '28px',
                'height': '28px',
              }
            },
            {
              selector: 'edge',
              style: {
                'width': 1,
                'line-color': '#1e3a5f',
                'target-arrow-color': '#334155',
                'target-arrow-shape': 'triangle',
                'curve-style': 'bezier',
                'arrow-scale': 0.55,
                'opacity': 0.7,
              }
            },
            {
              selector: 'node:selected',
              style: {
                'border-width': 3,
                'border-color': '#60a5fa',
                'overlay-color': '#3b82f6',
                'overlay-opacity': 0.12,
              }
            },
            {
              selector: '.faded',
              style: { 'opacity': 0.07 }
            },
          ],
          layout: LAYOUT_OPTS.dagre,
        });

        cy.on('tap', 'node', function(evt) { showNode(evt.target); });
        cy.on('tap', function(evt) {
          if (evt.target === cy) {
            document.getElementById('empty-msg').style.display = '';
            document.getElementById('node-card').classList.remove('visible');
          }
        });

        buildLegend(providers);
        document.getElementById('loading').style.display = 'none';
      })
      .catch(function(err) {
        document.getElementById('loading').innerHTML =
          '<span style="color:#f87171">Failed to load graph: ' + err.message + '</span>';
      });
  </script>
</body>
</html>
